databaseChangeLog:
  - changeSet:
      id: 001-create-habits-table
      author: amir

      changes:
        - createTable:
            tableName: habits

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: target_days
                  type: INT

                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP