databaseChangeLog:
  - changeSet:
      id: 002-create-records-table
      author: amir

      changes:
        - createTable:
            tableName: habit_records

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: habit_id
                  type: BIGINT

                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: habit_records
            baseColumnNames: habit_id

            referencedTableName: habits
            referencedColumnNames: id

            constraintName: fk_records_habit